name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show directory structure
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== crates dir ==="
          ls -la crates/ || echo "No crates dir"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust and wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: crates/ezclaw-core/target
          key: ${{ runner.os }}-wasm-target-${{ hashFiles('crates/ezclaw-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-target-

      - name: Generate Cargo.lock
        run: cd crates/ezclaw-core && cargo generate-lockfile

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install dependencies
        run: npm install

      - name: Build WASM
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== crates dir ==="
          ls -la crates/
          echo "=== Building WASM ==="
          npm run wasm:build 2>&1

      - name: Build Svelte
        run: npm run build

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"

      - name: Checkout build branch
        run: |
          git fetch origin build --depth 1 || true
          git checkout -B build origin/build 2>/dev/null || git checkout -b build

      - name: Copy build output
        run: |
          rm -rf ./*
          cp -r dist/* .
          rm -rf dist

      - name: Commit and push
        run: |
          git add -A
          git commit -m "Build: $(date '+%Y-%m-%d %H:%M')" || true
          git push -f origin build
